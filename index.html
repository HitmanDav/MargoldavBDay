<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
  <title>🐕 Майбах | Реалистичный Шпиц</title>
  <style>
    * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; min-height: 100vh;
      background: radial-gradient(circle at 20% 20%, #2b3a4a, #1a1f2c);
      overflow: hidden; touch-action: none;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    #canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    #dogVideo {
      position: fixed; width: 130px; height: auto;
      transform: translate(-50%, -50%);
      pointer-events: none; z-index: 50;
      /* небольшая плавность для обычного движения */
      transition: left 0.05s linear, top 0.05s linear;
    }
    #speechBubble {
      position: fixed; background: rgba(255,255,255,0.95); color: #1e1e2f;
      padding: 12px 18px; border-radius: 30px 30px 30px 5px;
      max-width: 260px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      font-size: 16px; line-height: 1.4; pointer-events: none; z-index: 100;
      backdrop-filter: blur(4px); border: 2px solid #ffd966;
      transition: opacity 0.2s; word-break: break-word;
    }
    #speechBubble::after {
      content: ''; position: absolute; bottom: -12px; left: 20px;
      border-width: 12px 12px 0 0; border-style: solid;
      border-color: #ffd966 transparent transparent transparent;
    }
    #controls {
      position: fixed; bottom: 20px; left: 0; right: 0; display: flex;
      justify-content: center; gap: 10px; padding: 8px 16px; z-index: 200;
      pointer-events: none; flex-wrap: wrap;
    }
    .btn {
      pointer-events: auto; background: rgba(30,30,46,0.8); backdrop-filter: blur(8px);
      border: 2px solid #ffb347; color: white; font-size: 28px;
      width: 64px; height: 64px; border-radius: 40px;
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      box-shadow: 0 6px 14px rgba(0,0,0,0.4); transition: all 0.15s;
      touch-action: manipulation;
    }
    .btn.small { width: 48px; height: 48px; font-size: 22px; }
    .btn:active { transform: scale(0.9); background: #ffb347; }
    #textInput {
      pointer-events: auto; flex: 1; max-width: 240px; padding: 0 20px;
      border-radius: 40px; border: 2px solid #f9d371;
      background: rgba(20,20,35,0.85); backdrop-filter: blur(8px);
      color: white; font-size: 16px; outline: none;
    }
    #textInput::placeholder { color: #bbb; }
    #moodIndicator {
      position: fixed; top: 20px; left: 20px; background: rgba(0,0,0,0.5);
      color: #ffd966; padding: 6px 16px; border-radius: 30px;
      font-weight: bold; backdrop-filter: blur(4px); z-index: 150;
      font-size: 18px; border: 1px solid #ffb347; cursor: pointer;
    }
    #statusPanel {
      position: fixed; top: 20px; right: 20px; background: rgba(20,20,40,0.8);
      padding: 8px 14px; border-radius: 20px; backdrop-filter: blur(8px);
      z-index: 300; color: white; font-size: 13px; display: flex;
      flex-direction: column; gap: 5px; border: 1px solid #ffb347;
    }
    #apiStatus { color: #8bc34a; }
    #sleepIndicator {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      font-size: 32px; opacity: 0; transition: opacity 0.5s; pointer-events: none; z-index: 50;
    }
    @media (max-width: 600px) {
      .btn { width: 56px; height: 56px; font-size: 24px; }
      #textInput { max-width: 160px; }
    }
  </style>
</head>
<body>

<div id="moodIndicator">😊 Счастливый</div>
<div id="statusPanel">
  <span>🔑 API: <span id="apiStatus">Загрузка...</span></span>
  <span>🎲 Действий: <span id="actionCount">0</span></span>
</div>
<div id="sleepIndicator">💤 Zzz...</div>
<div id="speechBubble" style="opacity:0;">Гав! Я Майбах!</div>
<canvas id="canvas"></canvas>
<video id="dogVideo" muted playsinline preload="auto"
       poster="animations/start.jpg"
       src="animations/walk.mp4"
       style="left: 50%; top: 50%;">
</video>

<div id="controls">
  <button class="btn" id="voiceBtn" title="Голосовой ввод">🎤</button>
  <input type="text" id="textInput" placeholder="Спроси Майбаха..." enterkeyhint="send">
  <button class="btn" id="memeBtn" title="Кинуть мем">🖼️</button>
  <button class="btn" id="barkBtn" title="Гавкнуть">🐕</button>
  <button class="btn small" id="cleanBtn" title="Подмести мемы">🧹</button>
  <button class="btn small" id="sleepBtn" title="Спать/Проснуться">😴</button>
</div>

<script>
  (function(){
    "use strict";

    // ---------- КОНФИГУРАЦИЯ ----------
    let CONFIG = {
      apiKeys: [],
      models: ["google/gemma-4-31b-it:free"],
      systemPrompt: "Ты — белый шпиц по имени Майбах. Ты мемный пёс, говоришь с юмором, иногда лаешь, но всегда дружелюбный. Отвечай коротко (до 2 предложений) и с характером. Можно использовать эмодзи."
    };
    let currentApiKeyIndex = 0, currentModelIndex = 0;

    // Состояние
    let pomeranian = {
      x: window.innerWidth/2, y: window.innerHeight/2,
      vx: 0, vy: 0,
      mood: 'happy',  // 'calm', 'happy', 'tired', 'angry'
      isSleeping: false,
      isDragged: false,
      dragOffsetX: 0, dragOffsetY: 0,
      facingRight: true,
      currentAnim: 'idle',
      angryTimeout: null,  // таймер для сброса злости
    };
    let width, height, mouseX = 0, mouseY = 0;
    let droppedMemes = [];
    let actionCounter = 0, lastActivity = Date.now();
    let sleepMessageCount = 0;   // сообщения во время сна
    let prevDragX = 0, prevDragY = 0, dragSpeed = 0; // для тряски

    // DOM
    const dogVideo = document.getElementById('dogVideo');
    const bubble = document.getElementById('speechBubble');
    const moodIndicator = document.getElementById('moodIndicator');
    const apiStatus = document.getElementById('apiStatus');
    const actionCountSpan = document.getElementById('actionCount');
    const sleepIndicator = document.getElementById('sleepIndicator');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const voiceBtn = document.getElementById('voiceBtn');
    const textInput = document.getElementById('textInput');
    const memeBtn = document.getElementById('memeBtn');
    const barkBtn = document.getElementById('barkBtn');
    const cleanBtn = document.getElementById('cleanBtn');
    const sleepBtn = document.getElementById('sleepBtn');

    // Анимации
    const ANIM = {
      idle:    { src: null,            type: 'poster' },
      walk:    { src: 'animations/walk.mp4',   type: 'video', rate: 1.0 },
      run:     { src: 'animations/run.mp4',    type: 'video', rate: 1.0 },
      sleep:   { src: 'animations/sleep.mp4',  type: 'video', rate: 1.0, loop: true },
      sitting: { src: 'animations/sitting.mp4',type: 'video', rate: 1.0, loop: true },
      looking_back: { src: 'animations/looking_back.mp4', type: 'video', rate: 1.0, once: true },
      sneeze:  { src: 'animations/sneeze.mp4', type: 'video', rate: 2.0, once: true },
    };

    // Фразы пробуждения
    const angryWakeUpPhrases = [
      "КТО МЕНЯ ТРЯСЁТ?!", "НЕ ТРОГАЙ СПЯЩЕГО ПСА!", "Я ТЕБЕ СЕЙЧАС ПОКАЖУ ГРОМКИЙ ЗВУК!",
      "ТЫ ЧТО, С УМА СОШЁЛ?!", "ГАВ-ГАВ-ГАВ!!!", "МАЙБАХ НЕ ДОВОЛЕН!!!"
    ];
    const softWakeUpPhrases = [
      "Ты чего? Я так сладко спал...", "Зачем разбудили?", "Ладно, давай играть.",
      "Я ещё немного уставший...", "Ну что там у тебя?"
    ];
    const tiredPhrases = ["Я устал...", "Может, поспим?", "Слишком много движений..."];
    const angryRunPhrases = ["НЕ БЕГАЙ ЗА МНОЙ!", "Я ЗЛОЙ!", "ГАВ! ГАВ!", "УЙДИ!", "РРРР!"];

    // ---------- ЗАГРУЗКА КОНФИГА ----------
    async function loadConfig() {
      try {
        const res = await fetch('config.json');
        const data = await res.json();
        if (data.apiKeys?.length) CONFIG.apiKeys = data.apiKeys;
        if (data.models?.length) CONFIG.models = data.models;
        if (data.systemPrompt) CONFIG.systemPrompt = data.systemPrompt;
        updateApiStatus();
      } catch (e) {
        const savedKeys = localStorage.getItem('spitz_api_keys');
        if (savedKeys) { try { CONFIG.apiKeys = JSON.parse(savedKeys); } catch(e){} }
        updateApiStatus();
      }
    }
    function updateApiStatus() {
      apiStatus.textContent = CONFIG.apiKeys.length ? `✅ ${CONFIG.apiKeys.length} ключ(ей)` : '❌ Нет ключей';
      apiStatus.style.color = CONFIG.apiKeys.length ? '#8bc34a' : '#ff8a80';
    }

    // ---------- РОТАЦИЯ API ----------
    function rotateApiKey() {
      if (!CONFIG.apiKeys.length) return null;
      currentApiKeyIndex = (currentApiKeyIndex + 1) % CONFIG.apiKeys.length;
      return CONFIG.apiKeys[currentApiKeyIndex];
    }
    function rotateModel() {
      if (!CONFIG.models.length) return "google/gemma-4-31b-it:free";
      currentModelIndex = (currentModelIndex + 1) % CONFIG.models.length;
      return CONFIG.models[currentModelIndex];
    }
    async function askAIWithRetry(userMessage, attempt = 0) {
      if (pomeranian.isSleeping) {
        showBubble('Я сплю, не могу говорить.', 2000);
        return;
      }
      if (attempt > CONFIG.apiKeys.length + 2) {
        showBubble('Все ключи исчерпаны 😢', 3000);
        return;
      }
      const apiKey = CONFIG.apiKeys[currentApiKeyIndex];
      const model = CONFIG.models[currentModelIndex] || "google/gemma-4-31b-it:free";
      if (!apiKey) { showBubble('Нет API ключа', 2000); return; }

      try {
        const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json',
            'HTTP-Referer': window.location.origin,
            'X-Title': 'Spitz Desktop'
          },
          body: JSON.stringify({
            model: model,
            messages: [
              { role: 'system', content: CONFIG.systemPrompt },
              { role: 'user', content: userMessage }
            ],
            max_tokens: 120,
            temperature: 0.9
          })
        });
        if (!response.ok) {
          if (response.status === 429 || response.status === 401 || response.status === 403) {
            rotateApiKey(); rotateModel();
            return askAIWithRetry(userMessage, attempt + 1);
          }
          throw new Error(`HTTP ${response.status}`);
        }
        const data = await response.json();
        const reply = data.choices?.[0]?.message?.content || 'Гав? Я не понял...';
        showBubble(reply, 5000);
        speakText(reply);
        incrementAction();
      } catch (e) {
        console.error(e);
        rotateApiKey(); rotateModel();
        if (attempt < 3) return askAIWithRetry(userMessage, attempt + 1);
        else showBubble('Ошибка связи с ИИ 😢', 3000);
      }
    }

    // ---------- CANVAS ----------
    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = width * window.devicePixelRatio;
      canvas.height = height * window.devicePixelRatio;
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // ---------- ОТСЛЕЖИВАНИЕ МЫШИ ----------
    function updateMouse(clientX, clientY) {
      mouseX = clientX; mouseY = clientY;
    }
    window.addEventListener('mousemove', (e) => updateMouse(e.clientX, e.clientY));
    window.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const t = e.touches[0];
      if (t) updateMouse(t.clientX, t.clientY);
    }, {passive: false});
    window.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const t = e.touches[0];
      if (t) updateMouse(t.clientX, t.clientY);
    }, {passive: false});

    // ---------- ЗАХВАТ ----------
    function isInsideDog(px, py) {
      const dx = px - pomeranian.x, dy = py - pomeranian.y;
      return (dx*dx)/(60*60) + (dy*dy)/(60*60) <= 1;
    }
    function handleDragStart(clientX, clientY) {
      if (pomeranian.isSleeping) {
        // разбудить просто захватом (без тряски) -> уставший
        softWakeUp('grab');
        return false;
      }
      if (isInsideDog(clientX, clientY)) {
        pomeranian.isDragged = true;
        pomeranian.dragOffsetX = pomeranian.x - clientX;
        pomeranian.dragOffsetY = pomeranian.y - clientY;
        prevDragX = clientX; prevDragY = clientY; dragSpeed = 0;
        lastActivity = Date.now();
        showBubble('😮 Отпусти!', 800);
        return true;
      }
      return false;
    }
    function handleDragMove(clientX, clientY) {
      if (!pomeranian.isDragged) return;
      // для спящего тоже может случиться, если захватили и трясут
      let newX = clientX + pomeranian.dragOffsetX;
      let newY = clientY + pomeranian.dragOffsetY;
      newX = Math.min(width-60, Math.max(60, newX));
      newY = Math.min(height-80, Math.max(80, newY));
      pomeranian.x = newX; pomeranian.y = newY;
      // считать скорость тряски
      const dx = clientX - prevDragX, dy = clientY - prevDragY;
      dragSpeed = Math.hypot(dx, dy);
      prevDragX = clientX; prevDragY = clientY;

      // если спит и скорость большая -> злой пробуждение
      if (pomeranian.isSleeping && dragSpeed > 15) {
        angryWakeUp();
        pomeranian.isDragged = false; // чтоб не мешать бегу
      }
      lastActivity = Date.now();
    }
    function handleDragEnd() {
      pomeranian.isDragged = false;
      if (pomeranian.isSleeping && !pomeranian.angryTimeout) {
        // если просто взяли и не потрясли – уже разбудили в softWakeUp
      }
    }

    window.addEventListener('mousedown', (e) => handleDragStart(e.clientX, e.clientY));
    window.addEventListener('mousemove', (e) => handleDragMove(e.clientX, e.clientY));
    window.addEventListener('mouseup', handleDragEnd);
    window.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const t = e.touches[0]; if (t) handleDragStart(t.clientX, t.clientY);
    }, {passive: false});
    window.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const t = e.touches[0]; if (t) handleDragMove(t.clientX, t.clientY);
    }, {passive: false});
    window.addEventListener('touchend', handleDragEnd);
    window.addEventListener('touchcancel', handleDragEnd);

    // ---------- АВТОНОМНОЕ ДВИЖЕНИЕ (с учётом настроения и близости мыши) ----------
    function autonomousMovement() {
      if (pomeranian.isDragged || pomeranian.isSleeping) return;
      const distToMouse = Math.hypot(pomeranian.x - mouseX, pomeranian.y - mouseY);
      const close = distToMouse < 150;

      // Реакция на близость мыши согласно настроению
      if (close) {
        if (pomeranian.mood === 'angry') {
          // убегаем от мыши: придаём ускорение от мыши
          const dx = pomeranian.x - mouseX, dy = pomeranian.y - mouseY;
          const len = Math.hypot(dx, dy) || 1;
          pomeranian.vx += (dx/len) * 2.5;
          pomeranian.vy += (dy/len) * 2.5;
        } else if (pomeranian.mood === 'tired') {
          // медленно уходит от мыши
          const dx = pomeranian.x - mouseX, dy = pomeranian.y - mouseY;
          const len = Math.hypot(dx, dy) || 1;
          pomeranian.vx += (dx/len) * 0.8;
          pomeranian.vy += (dy/len) * 0.8;
        }
        // calm / happy - ничего не делают
      }

      // Случайное блуждание
      if (Math.random() < 0.02) {
        pomeranian.vx += (Math.random() - 0.5) * 1.5;
        pomeranian.vy += (Math.random() - 0.5) * 1.5;
      }
      const maxSpeed = pomeranian.mood === 'angry' ? 5.0 : (pomeranian.mood === 'tired' ? 1.0 : 2.2);
      const spd = Math.hypot(pomeranian.vx, pomeranian.vy);
      if (spd > maxSpeed) {
        pomeranian.vx *= maxSpeed / spd;
        pomeranian.vy *= maxSpeed / spd;
      }
      pomeranian.vx *= 0.98; pomeranian.vy *= 0.98;

      let newX = pomeranian.x + pomeranian.vx;
      let newY = pomeranian.y + pomeranian.vy;
      if (newX < 60 || newX > width-60) { pomeranian.vx *= -0.5; newX = Math.min(width-60, Math.max(60, newX)); }
      if (newY < 80 || newY > height-80) { pomeranian.vy *= -0.5; newY = Math.min(height-80, Math.max(80, newY)); }
      pomeranian.x = newX; pomeranian.y = newY;
    }

    // ---------- УПРАВЛЕНИЕ АНИМАЦИЯМИ ----------
    let animQueue = [];
    function setAnimation(animName) {
      if (pomeranian.currentAnim === animName && animName !== 'sneeze' && animName !== 'looking_back') return;
      const anim = ANIM[animName];
      if (!anim) return;

      if ((pomeranian.currentAnim === 'sneeze' || pomeranian.currentAnim === 'looking_back') && !dogVideo.ended) {
        if (animName !== pomeranian.currentAnim) animQueue.push(animName);
        return;
      }
      pomeranian.currentAnim = animName;
      if (anim.type === 'poster') {
        dogVideo.pause(); dogVideo.currentTime = 0;
      } else {
        dogVideo.src = anim.src;
        dogVideo.playbackRate = anim.rate || 1.0;
        dogVideo.loop = anim.loop || false;
        dogVideo.currentTime = 0;
        dogVideo.play().catch(e=>{});
        if (anim.once) {
          dogVideo.onended = () => {
            setAnimation('idle');
            if (animQueue.length) { const next = animQueue.shift(); setAnimation(next); }
          };
        } else dogVideo.onended = null;
      }
    }

    function updateAnimationByState() {
      if (pomeranian.isSleeping) { setAnimation('sleep'); return; }
      if (pomeranian.isDragged) {
        setAnimation(dragSpeed > 4 ? 'run' : 'walk');
        return;
      }
      const spd = Math.hypot(pomeranian.vx, pomeranian.vy);
      if (spd < 0.3) setAnimation('idle');
      else if (spd < 2.5) setAnimation('walk');
      else setAnimation('run');
    }

    function updateFacing() {
      if (pomeranian.isSleeping) return;
      if (Math.abs(pomeranian.vx) < 0.1 && !pomeranian.isDragged) return;
      const goingRight = pomeranian.vx > 0 || (pomeranian.isDragged && pomeranian.x > prevDragX);
      if (goingRight !== pomeranian.facingRight) {
        pomeranian.facingRight = goingRight;
        dogVideo.style.transform = `translate(-50%, -50%) scaleX(${goingRight ? 1 : -1})`;
      }
    }

    // ---------- НАСТРОЕНИЕ ----------
    function updateMood() {
      if (pomeranian.isSleeping) return;
      // Автосон для уставшего через 15 сек бездействия
      if (pomeranian.mood === 'tired' && Date.now() - lastActivity > 15000 && !pomeranian.isDragged) {
        goToSleep();
        return;
      }
      // Возврат из злости через 5 секунд
      if (pomeranian.mood === 'angry' && pomeranian.angryTimeout === null) {
        setAngryTimeout();
      }
    }

    function setAngryTimeout() {
      if (pomeranian.angryTimeout) clearTimeout(pomeranian.angryTimeout);
      pomeranian.angryTimeout = setTimeout(() => {
        pomeranian.mood = Math.random() < 0.5 ? 'calm' : 'happy';
        pomeranian.angryTimeout = null;
        updateMoodDisplay();
      }, 5000);
    }

    function updateMoodDisplay() {
      const emoji = {
        calm: '😌 Спокойный', happy: '😊 Счастливый',
        tired: '😴 Уставший', angry: '😠 Злой'
      };
      moodIndicator.innerHTML = emoji[pomeranian.mood] || '😌 Спокойный';
    }

    // ---------- СОН ----------
    function goToSleep() {
      pomeranian.isSleeping = true;
      pomeranian.vx = pomeranian.vy = 0;
      sleepIndicator.style.opacity = '1';
      setAnimation('sleep');
      showBubble('😴 Хррр...', 2000);
      playSnore();
      sleepMessageCount = 0;
    }

    function softWakeUp(reason = 'message') {
      if (!pomeranian.isSleeping) return;
      pomeranian.isSleeping = false;
      sleepIndicator.style.opacity = '0';
      pomeranian.mood = 'tired';
      updateMoodDisplay();
      const phrase = softWakeUpPhrases[Math.floor(Math.random() * softWakeUpPhrases.length)];
      showBubble(phrase, 3000);
      speakText(phrase);
      lastActivity = Date.now();
      setAnimation('idle');
    }

    function angryWakeUp() {
      if (!pomeranian.isSleeping) return;
      pomeranian.isSleeping = false;
      sleepIndicator.style.opacity = '0';
      pomeranian.mood = 'angry';
      updateMoodDisplay();
      const phrase = angryWakeUpPhrases[Math.floor(Math.random() * angryWakeUpPhrases.length)];
      showBubble(phrase.toUpperCase(), 3000);
      speakText(phrase.toUpperCase());
      // Быстрый бег в случайную сторону
      pomeranian.vx = (Math.random() - 0.5) * 10;
      pomeranian.vy = (Math.random() - 0.5) * 10;
      setAnimation('run');
      setAngryTimeout();
      lastActivity = Date.now();
    }

    function maybeLookBack(actionX) {
      if (pomeranian.isSleeping || pomeranian.isDragged) return;
      const facingRight = pomeranian.facingRight;
      const dogX = pomeranian.x;
      if ((facingRight && actionX < dogX) || (!facingRight && actionX > dogX)) {
        if (Math.random() < 0.3) {
          setAnimation('looking_back');
          showBubble('...?', 1500);
        }
      }
    }

    // ---------- ЗВУКИ ----------
    function playSnore() {
      try {
        const ac = new (window.AudioContext||window.webkitAudioContext)();
        const osc = ac.createOscillator(); osc.type='sawtooth';
        osc.frequency.setValueAtTime(120, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(80, ac.currentTime+0.5);
        const g = ac.createGain(); g.gain.setValueAtTime(0.1, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, ac.currentTime+0.8);
        osc.connect(g).connect(ac.destination); osc.start(); osc.stop(ac.currentTime+0.8);
      } catch(e){}
    }
    function playBark() {
      try {
        const ac = new (window.AudioContext||window.webkitAudioContext)();
        const osc = ac.createOscillator(); osc.type='triangle';
        osc.frequency.setValueAtTime(700, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, ac.currentTime+0.15);
        const g = ac.createGain(); g.gain.setValueAtTime(0.3, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, ac.currentTime+0.2);
        osc.connect(g).connect(ac.destination); osc.start(); osc.stop(ac.currentTime+0.2);
        if (!pomeranian.isSleeping) showBubble('ГАВ!', 1000);
      } catch(e){}
    }
    function playAngryBark() {
      try {
        const ac = new (window.AudioContext||window.webkitAudioContext)();
        const osc = ac.createOscillator(); osc.type='sawtooth';
        osc.frequency.setValueAtTime(300, ac.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, ac.currentTime+0.3);
        const g = ac.createGain(); g.gain.setValueAtTime(0.4, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, ac.currentTime+0.4);
        osc.connect(g).connect(ac.destination); osc.start(); osc.stop(ac.currentTime+0.4);
      } catch(e){}
    }

    // ---------- РЕЧЬ И МЕМЫ ----------
    function showBubble(text, duration=4000) {
      bubble.style.opacity = '1';
      bubble.textContent = text;
      bubble.style.left = (pomeranian.x - 40) + 'px';
      bubble.style.top = (pomeranian.y - 110) + 'px';
      if (window.bubbleTimeout) clearTimeout(window.bubbleTimeout);
      window.bubbleTimeout = setTimeout(()=>{ bubble.style.opacity = '0'; }, duration);
    }
    function speakText(text) {
      if (!window.speechSynthesis) return;
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ru-RU'; u.rate = 1.1;
      window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
    }
    function dropRandomMeme() {
      const list = ['1.jpg','2.png','3.gif']; // замените на свои
      const name = list[Math.floor(Math.random()*list.length)];
      const img = new Image(); img.src = 'memes/'+name;
      droppedMemes.push({
        x: pomeranian.x + (Math.random()-0.5)*40,
        y: pomeranian.y - 20,
        vy: -2, img
      });
      showBubble('🔥 Лови мем!', 2000);
    }
    function drawMemes() {
      droppedMemes.forEach(m=>{
        m.y += m.vy; m.vy += 0.2;
        if (m.y > height-60) { m.y = height-60; m.vy = 0; }
        if (m.img && m.img.complete) ctx.drawImage(m.img, m.x-30, m.y-30, 60, 60);
        else {
          ctx.fillStyle='#FFB6C1'; ctx.fillRect(m.x-30, m.y-30, 60, 60);
          ctx.fillStyle='black'; ctx.font='bold 16px sans'; ctx.fillText('🖼️', m.x-12, m.y+5);
        }
      });
      if (droppedMemes.length > 20) droppedMemes.shift();
    }
    function incrementAction() { actionCounter++; actionCountSpan.textContent = actionCounter; }

    // ---------- ИГРОВОЙ ЦИКЛ ----------
    function gameLoop() {
      if (!pomeranian.isDragged && !pomeranian.isSleeping) autonomousMovement();
      updateMood();
      updateAnimationByState();
      updateFacing();
      dogVideo.style.left = pomeranian.x + 'px';
      dogVideo.style.top = pomeranian.y + 'px';
      if (bubble.style.opacity !== '0') {
        bubble.style.left = (pomeranian.x-40)+'px';
        bubble.style.top = (pomeranian.y-110)+'px';
      }
      ctx.clearRect(0,0,width,height);
      drawMemes();
      requestAnimationFrame(gameLoop);
    }

    // ---------- СЛУЧАЙНЫЕ ДЕЙСТВИЯ ----------
    setInterval(() => {
      if (pomeranian.isSleeping) return;
      const r = Math.random();
      if (r < 0.1) { // чих
        setAnimation('sneeze');
        if (!pomeranian.isSleeping) showBubble('Апчхи!', 1500);
        incrementAction();
      } else if (r < 0.2) { // оглядывание просто так
        setAnimation('looking_back');
        incrementAction();
      } else if (r < 0.4) {
        playBark(); incrementAction();
      } else if (r < 0.55) {
        dropRandomMeme(); incrementAction();
      } else if (r < 0.7) {
        // смена настроения
        const moods = ['calm','happy','tired','angry'];
        pomeranian.mood = moods[Math.floor(Math.random()*moods.length)];
        updateMoodDisplay();
        incrementAction();
      }
    }, 15000);

    // ---------- ОБРАБОТЧИКИ КНОПОК И ВВОДА ----------
    function trySendMessage(text) {
      if (pomeranian.isSleeping) {
        sleepMessageCount++;
        if (sleepMessageCount >= 3) {
          softWakeUp('message');
          sleepMessageCount = 0;
        } else {
          showBubble('Я сплю... (напиши ещё раз, чтобы разбудить)', 2000);
        }
        return;
      }
      askAIWithRetry(text);
      lastActivity = Date.now();
    }

    voiceBtn.addEventListener('click', () => {
      if (pomeranian.isSleeping) { trySendMessage(''); return; }
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) { showBubble('Нет распознавания речи', 2000); return; }
      const rec = new SpeechRecognition();
      rec.lang = 'ru-RU'; rec.interimResults = false;
      rec.onstart = () => showBubble('🎤 Говорите...', 1000);
      rec.onresult = (e) => {
        const t = e.results[0][0].transcript;
        textInput.value = t;
        trySendMessage(t);
        maybeLookBack(pomeranian.x); // условный центр экрана - можно mouseX
      };
      rec.onerror = () => showBubble('Не расслышал', 1500);
      rec.start();
    });

    textInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const msg = textInput.value.trim();
        if (msg) {
          trySendMessage(msg);
          textInput.value = '';
          maybeLookBack(pomeranian.x);
        }
      }
    });

    memeBtn.addEventListener('click', () => { dropRandomMeme(); incrementAction(); });
    barkBtn.addEventListener('click', () => { playBark(); incrementAction(); });
    cleanBtn.addEventListener('click', () => { droppedMemes=[]; showBubble('🧹 Мемы убраны',1500); });
    sleepBtn.addEventListener('click', () => {
      if (pomeranian.isSleeping) {
        softWakeUp('button');
      } else {
        goToSleep();
      }
    });

    moodIndicator.addEventListener('dblclick', () => {
      const moods = ['calm','happy','tired','angry'];
      const idx = moods.indexOf(pomeranian.mood);
      pomeranian.mood = moods[(idx+1)%4];
      updateMoodDisplay();
    });

    // Drag & Drop мемов
    document.addEventListener('dragover', e=>e.preventDefault());
    document.addEventListener('drop', e=>{
      e.preventDefault();
      const files = e.dataTransfer.files;
      for (let f of files) {
        if (f.type.startsWith('image/')) {
          const img = new Image(); img.src = URL.createObjectURL(f);
          droppedMemes.push({ x: pomeranian.x+(Math.random()-0.5)*40, y: pomeranian.y-20, vy:-2, img });
        }
      }
      showBubble('🔥 Новые мемы!',1500);
      incrementAction();
    });

    // Тряска телефона (громкий звук) — трактуем как angry wakeup если спит
    if (window.DeviceMotionEvent) {
      let lastShake = 0;
      window.addEventListener('devicemotion', (e) => {
        const acc = e.accelerationIncludingGravity;
        if (!acc) return;
        const mag = Math.sqrt(acc.x*acc.x+acc.y*acc.y+acc.z*acc.z);
        if (mag > 20 && Date.now()-lastShake > 2000) {
          lastShake = Date.now();
          if (pomeranian.isSleeping) {
            angryWakeUp();
          } else {
            pomeranian.mood = 'angry';
            updateMoodDisplay();
            playAngryBark();
            for (let i=0;i<3;i++) dropRandomMeme();
            showBubble('ААА! ТРЯСЁТ!',2000);
            setAngryTimeout();
          }
        }
      });
    }

    // ---------- ЗАПУСК ----------
    loadConfig().then(() => {
      gameLoop();
      setTimeout(()=> showBubble('Привет! Я Майбах. Зажми меня, чтобы двигать!',4000), 500);
    });

  })();
</script>
</body>
</html>
